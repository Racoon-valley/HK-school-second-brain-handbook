<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F4F1EC">
<title>Second Brain Tracker</title>
<meta name="description" content="Track your learning task by task. Build your second brain with data visualization and progress tracking.">
<meta property="og:title" content="Second Brain Tracker">
<meta property="og:description" content="Task-by-task learning tracker with data visualization and progress tracking.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root { min-height: 100vh; }
  body { background: #F4F1EC; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
<script type="text/babel" data-type="module">
const { useState, useRef, useEffect } = React;
const { PieChart, Pie, Cell, BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, AreaChart, Area, RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis } = Recharts;

const C = {
  bg: "#F4F1EC", srf: "#FFFDF9", card: "#1A1917", cardA: "#252420",
  coral: "#D85A30", teal: "#1D9E75", blue: "#378ADD", purp: "#7F77DD",
  amber: "#BA7517", pink: "#D4537E", green: "#4A9E2F",
  tx: "#1A1917", txM: "#7A756E", txL: "#ACA7A0", brd: "rgba(28,27,25,0.08)",
};
const TC = [C.coral, C.teal, C.blue, C.purp, C.amber, C.pink, C.green];
const tc = (topic, all) => TC[all.indexOf(topic) % TC.length];

const INIT = [
  { id:1,title:"Learn CSS Grid layout",topic:"Frontend",status:"done",conf:6,notes:"Understood grid-template-columns and fr units.",date:"2026-05-01",fuzzy:"Subgrid behavior" },
  { id:2,title:"Study React hooks patterns",topic:"Frontend",status:"done",conf:4,notes:"useState and useEffect clear. useMemo needs work.",date:"2026-05-03",fuzzy:"When to memoize" },
  { id:3,title:"Read about spaced repetition",topic:"Learning Science",status:"done",conf:7,notes:"Ebbinghaus curve, Leitner system, Anki basics.",date:"2026-05-05",fuzzy:"" },
  { id:4,title:"Build a REST API with Node",topic:"Backend",status:"in-progress",conf:2,notes:"Started with Express routing.",date:"2026-05-08",fuzzy:"Error handling middleware" },
  { id:5,title:"Explore MCP protocol",topic:"AI Tools",status:"todo",conf:1,notes:"",date:"2026-05-12",fuzzy:"" },
  { id:6,title:"Mental models for decisions",topic:"Learning Science",status:"done",conf:5,notes:"First principles, inversion, second-order thinking.",date:"2026-05-06",fuzzy:"Applying inversion" },
  { id:7,title:"PostgreSQL indexing",topic:"Backend",status:"done",conf:4,notes:"B-tree vs hash. Composite indexes. EXPLAIN ANALYZE.",date:"2026-05-09",fuzzy:"Partial indexes" },
  { id:8,title:"Design system color theory",topic:"Design",status:"in-progress",conf:3,notes:"Color contrast ratios, WCAG standards.",date:"2026-05-11",fuzzy:"Accessible palettes" },
];

const CustomTip = ({ active, payload, color }) => {
  if (!active || !payload?.length) return null;
  const d = payload[0].payload;
  return (
    <div style={{ background: C.srf, border: `1px solid ${C.brd}`, borderRadius: 8, padding: "8px 12px", boxShadow: "0 4px 16px rgba(0,0,0,0.1)", fontSize: 12 }}>
      <div style={{ fontWeight: 600, marginBottom: 2 }}>{d.name || d.subject || ""}</div>
      {payload.map((p, i) => <div key={i} style={{ color: p.color || color, fontWeight: 600 }}>{p.name}: {p.value}</div>)}
    </div>
  );
};

function Stat({ label, value, sub, gradient }) {
  return (
    <div style={{ background: `linear-gradient(135deg, ${gradient[0]}, ${gradient[1]})`, borderRadius: 18, padding: "20px 18px", color: "#fff", position: "relative", overflow: "hidden", minHeight: 100 }}>
      <div style={{ position: "absolute", top: -30, right: -30, width: 90, height: 90, borderRadius: "50%", background: "rgba(255,255,255,0.08)" }} />
      <div style={{ position: "absolute", bottom: -20, left: -20, width: 60, height: 60, borderRadius: "50%", background: "rgba(255,255,255,0.06)" }} />
      <div style={{ fontSize: 12, fontWeight: 500, opacity: 0.75, marginBottom: 2, position: "relative" }}>{label}</div>
      <div style={{ fontSize: 32, fontWeight: 700, lineHeight: 1.1, position: "relative" }}>{value}</div>
      {sub && <div style={{ fontSize: 11, opacity: 0.6, marginTop: 4, position: "relative" }}>{sub}</div>}
    </div>
  );
}

function Modal({ children, onClose }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(26,25,23,0.55)", backdropFilter: "blur(4px)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 1000 }}
      onClick={onClose}>
      <div style={{ background: C.srf, borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 560, maxHeight: "88vh", overflow: "auto", padding: "28px 24px 32px", animation: "slideUp .25s ease" }}
        onClick={e => e.stopPropagation()}>
        {children}
      </div>
    </div>
  );
}

function TaskForm({ task, topics, onSave, onClose, onDelete }) {
  const [f, setF] = useState(task || { title: "", topic: topics[0] || "", status: "todo", conf: 1, notes: "", date: new Date().toISOString().slice(0, 10), fuzzy: "" });
  const s = (k, v) => setF(p => ({ ...p, [k]: v }));
  const inp = { width: "100%", padding: "11px 14px", borderRadius: 10, border: `1px solid ${C.brd}`, fontSize: 15, fontFamily: "inherit", background: C.bg, outline: "none", color: C.tx, WebkitAppearance: "none" };
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <h3 style={{ fontSize: 18, fontWeight: 700, margin: 0 }}>{task ? "Edit task" : "New learning task"}</h3>
        <button onClick={onClose} style={{ background: C.bg, border: "none", width: 32, height: 32, borderRadius: 8, fontSize: 16, cursor: "pointer", color: C.txM, fontFamily: "inherit", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <i className="ti ti-x" aria-hidden="true" />
        </button>
      </div>
      <div style={{ display: "grid", gap: 14 }}>
        <div>
          <label style={{ fontSize: 12, fontWeight: 600, color: C.txM, display: "block", marginBottom: 5 }}>Task title</label>
          <input style={inp} value={f.title} onChange={e => s("title", e.target.value)} placeholder="What are you learning?" />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <div>
            <label style={{ fontSize: 12, fontWeight: 600, color: C.txM, display: "block", marginBottom: 5 }}>Topic</label>
            <select style={{ ...inp, cursor: "pointer" }} value={f.topic} onChange={e => s("topic", e.target.value)}>
              {topics.map(t => <option key={t}>{t}</option>)}
              <option value="__new">+ New topic</option>
            </select>
            {f.topic === "__new" && <input style={{ ...inp, marginTop: 6 }} placeholder="Topic name" onBlur={e => { if (e.target.value.trim()) s("topic", e.target.value.trim()); }} />}
          </div>
          <div>
            <label style={{ fontSize: 12, fontWeight: 600, color: C.txM, display: "block", marginBottom: 5 }}>Status</label>
            <select style={{ ...inp, cursor: "pointer" }} value={f.status} onChange={e => s("status", e.target.value)}>
              <option value="todo">To do</option>
              <option value="in-progress">In progress</option>
              <option value="done">Done</option>
            </select>
          </div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <div>
            <label style={{ fontSize: 12, fontWeight: 600, color: C.txM, display: "block", marginBottom: 5 }}>Date</label>
            <input type="date" style={inp} value={f.date} onChange={e => s("date", e.target.value)} />
          </div>
          <div>
            <label style={{ fontSize: 12, fontWeight: 600, color: C.txM, display: "block", marginBottom: 5 }}>Confidence (1-7)</label>
            <div style={{ display: "flex", gap: 4, paddingTop: 4 }}>
              {[1,2,3,4,5,6,7].map(i => (
                <button key={i} onClick={() => s("conf", i)} style={{ flex: 1, height: 36, borderRadius: 8, border: "none", background: f.conf >= i ? C.coral : C.bg, color: f.conf >= i ? "#fff" : C.txL, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", fontSize: 13, transition: "all .15s" }}>{i}</button>
              ))}
            </div>
          </div>
        </div>
        <div>
          <label style={{ fontSize: 12, fontWeight: 600, color: C.txM, display: "block", marginBottom: 5 }}>What I learned</label>
          <textarea style={{ ...inp, minHeight: 72, resize: "vertical" }} value={f.notes} onChange={e => s("notes", e.target.value)} placeholder="Key takeaways in your own words..." />
        </div>
        <div>
          <label style={{ fontSize: 12, fontWeight: 600, color: C.txM, display: "block", marginBottom: 5 }}>Still fuzzy</label>
          <input style={inp} value={f.fuzzy} onChange={e => s("fuzzy", e.target.value)} placeholder="Knowledge gaps to revisit" />
        </div>
        <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
          <button onClick={() => { if (f.title.trim()) onSave(f); }} style={{ flex: 1, padding: "13px", borderRadius: 12, border: "none", background: C.card, color: "#fff", fontWeight: 600, fontSize: 15, cursor: "pointer", fontFamily: "inherit" }}>
            {task ? "Save" : "Add task"}
          </button>
          {task && <button onClick={() => onDelete(task.id)} style={{ padding: "13px 18px", borderRadius: 12, border: `1px solid ${C.brd}`, background: "transparent", color: C.coral, fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "inherit" }}>Delete</button>}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [view, setView] = useState("dashboard");
  const [tasks, setTasks] = useState(INIT);
  const [modal, setModal] = useState(null);
  const [filter, setFilter] = useState("all");

  const topics = [...new Set(tasks.map(t => t.topic))];
  const done = tasks.filter(t => t.status === "done");
  const prog = tasks.filter(t => t.status === "in-progress");
  const avgC = done.length ? Math.round(done.reduce((a, t) => a + t.conf, 0) / done.length * 10) / 10 : 0;

  const topicD = topics.map(tp => {
    const tt = tasks.filter(t => t.topic === tp);
    const d = tt.filter(t => t.status === "done");
    return { name: tp, count: tt.length, done: d.length, color: tc(tp, topics),
      conf: Math.round(tt.reduce((a, t) => a + t.conf, 0) / Math.max(1, tt.length) * 10) / 10 };
  });

  const weekD = (() => {
    const w = {};
    tasks.forEach(t => {
      const d = new Date(t.date); const wk = `W${Math.ceil(d.getDate() / 7)}`;
      if (!w[wk]) w[wk] = { name: wk, total: 0, done: 0 };
      w[wk].total++; if (t.status === "done") w[wk].done++;
    });
    return Object.values(w);
  })();

  const radarD = topics.map(tp => {
    const tt = tasks.filter(t => t.topic === tp);
    return { subject: tp.length > 10 ? tp.slice(0, 9) + ".." : tp,
      volume: tt.length * 15, confidence: Math.round(tt.reduce((a, t) => a + t.conf, 0) / Math.max(1, tt.length) * 14) };
  });

  const save = (f) => {
    if (f.id) setTasks(p => p.map(t => t.id === f.id ? f : t));
    else setTasks(p => [...p, { ...f, id: Date.now() }]);
    setModal(null);
  };
  const del = (id) => { setTasks(p => p.filter(t => t.id !== id)); setModal(null); };
  const filtered = filter === "all" ? tasks : tasks.filter(t => t.topic === filter);

  const stLabel = { done: { bg: "#DDFAEE", c: "#0B6E4F", t: "Done" }, "in-progress": { bg: "#FFF3DB", c: "#8B5C00", t: "In progress" }, todo: { bg: "#EEEDEB", c: "#6B6460", t: "To do" } };

  const NAV = [
    { id: "dashboard", icon: "layout-dashboard", label: "Dashboard" },
    { id: "tasks", icon: "list-check", label: "Tasks" },
    { id: "collections", icon: "folders", label: "Collections" },
    { id: "handbook", icon: "book-2", label: "Handbook" },
  ];

  const TaskCard = ({ t }) => {
    const cl = tc(t.topic, topics); const st = stLabel[t.status];
    return (
      <div onClick={() => setModal(t)} style={{ background: C.srf, border: `1px solid ${C.brd}`, borderRadius: 12, padding: "14px 16px", cursor: "pointer", transition: "transform .12s" }}
        onMouseEnter={e => e.currentTarget.style.transform = "translateY(-2px)"} onMouseLeave={e => e.currentTarget.style.transform = "none"}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10, marginBottom: 6 }}>
          <div style={{ fontWeight: 600, fontSize: 14 }}>{t.title}</div>
          <span style={{ fontSize: 11, fontWeight: 600, padding: "3px 10px", borderRadius: 100, background: st.bg, color: st.c, whiteSpace: "nowrap", flexShrink: 0 }}>{st.t}</span>
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
          <span style={{ fontSize: 11, fontWeight: 600, padding: "2px 9px", borderRadius: 100, background: cl + "15", color: cl }}>{t.topic}</span>
          <span style={{ fontSize: 11, color: C.txL }}>{t.date}</span>
          <div style={{ display: "flex", gap: 2, marginLeft: "auto" }}>{[1,2,3,4,5,6,7].map(i => <div key={i} style={{ width: 5, height: 5, borderRadius: "50%", background: i <= t.conf ? cl : C.brd }} />)}</div>
        </div>
        {t.fuzzy && <div style={{ fontSize: 11, color: C.amber, fontWeight: 500, marginTop: 4 }}>Gap: {t.fuzzy}</div>}
      </div>
    );
  };

  return (
    <div style={{ fontFamily: "'DM Sans', system-ui, sans-serif", background: C.bg, color: C.tx, minHeight: "100vh", WebkitFontSmoothing: "antialiased" }}>
      
      <style>{`
        @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .main-grid{display:grid;grid-template-columns:200px 1fr}
        .sidebar{display:flex}
        .bottombar{display:none}
        .content{padding:28px 36px 40px}
        .stat-grid{grid-template-columns:repeat(4,1fr)}
        .chart-grid{grid-template-columns:1.4fr 1fr}
        .coll-inner{grid-template-columns:1.3fr 1fr}
        @media(max-width:700px){
          .main-grid{grid-template-columns:1fr}
          .sidebar{display:none!important}
          .bottombar{display:flex!important}
          .content{padding:20px 16px 100px}
          .stat-grid{grid-template-columns:repeat(2,1fr)!important}
          .chart-grid{grid-template-columns:1fr!important}
          .coll-inner{grid-template-columns:1fr!important}
          .code-grid{grid-template-columns:repeat(2,1fr)!important}
          .step-grid{grid-template-columns:1fr!important}
        }
      `}</style>

      <div className="main-grid">
        {/* SIDEBAR */}
        <aside className="sidebar" style={{ background: C.srf, borderRight: `1px solid ${C.brd}`, padding: "20px 12px", flexDirection: "column", gap: 2, position: "sticky", top: 0, height: "100vh" }}>
          <div style={{ fontSize: 15, fontWeight: 800, padding: "10px 14px 18px", letterSpacing: -0.5 }}>Second Brain</div>
          {NAV.map(n => (
            <button key={n.id} onClick={() => setView(n.id)} style={{ display: "flex", alignItems: "center", gap: 9, width: "100%", padding: "9px 14px", borderRadius: 10, border: "none", background: view === n.id ? C.card : "transparent", color: view === n.id ? "#fff" : C.txM, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", textAlign: "left", transition: "all .15s" }}>
              <i className={`ti ti-${n.icon}`} style={{ fontSize: 17 }} aria-hidden="true" />{n.label}
            </button>
          ))}
          <div style={{ flex: 1 }} />
          <button onClick={() => setModal("new")} style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "11px", borderRadius: 12, border: "none", background: C.coral, color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", width: "100%" }}>
            <i className="ti ti-plus" style={{ fontSize: 15 }} aria-hidden="true" /> New task
          </button>
        </aside>

        <main className="content" style={{ maxWidth: 900, width: "100%" }}>

          {view === "dashboard" && <>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24, flexWrap: "wrap", gap: 10 }}>
              <div>
                <h1 style={{ fontSize: 24, fontWeight: 800, marginBottom: 2, letterSpacing: -0.5 }}>Dashboard</h1>
                <p style={{ color: C.txM, fontSize: 14, margin: 0 }}>Your learning at a glance</p>
              </div>
              <button onClick={() => setModal("new")} style={{ padding: "9px 18px", borderRadius: 10, border: "none", background: C.card, color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 6 }}>
                <i className="ti ti-plus" style={{ fontSize: 14 }} aria-hidden="true" /> Add
              </button>
            </div>

            <div className="stat-grid" style={{ display: "grid", gap: 12, marginBottom: 24 }}>
              <Stat label="Total tasks" value={tasks.length} sub={`${prog.length} in progress`} gradient={["#4A7AE5", "#2D5BC7"]} />
              <Stat label="Completed" value={done.length} sub={`${Math.round(done.length / Math.max(1, tasks.length) * 100)}%`} gradient={["#1DB386", "#158C6A"]} />
              <Stat label="Topics" value={topics.length} sub="knowledge areas" gradient={["#9078E8", "#6E5ACE"]} />
              <Stat label="Confidence" value={avgC} sub="avg out of 7" gradient={["#E06838", "#C24E24"]} />
            </div>

            <div className="chart-grid" style={{ display: "grid", gap: 14, marginBottom: 20 }}>
              <div style={{ background: C.card, borderRadius: 18, padding: "22px 18px" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#fff", marginBottom: 2 }}>Weekly activity</div>
                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", marginBottom: 14 }}>Completed vs total</div>
                <ResponsiveContainer width="100%" height={160}>
                  <AreaChart data={weekD}>
                    <defs><linearGradient id="gT" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.teal} stopOpacity={0.35} /><stop offset="100%" stopColor={C.teal} stopOpacity={0.03} /></linearGradient></defs>
                    <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{ fill: "rgba(255,255,255,0.35)", fontSize: 11 }} />
                    <YAxis hide />
                    <Tooltip cursor={false} content={<CustomTip color={C.teal} />} />
                    <Area type="monotone" dataKey="done" stroke={C.teal} strokeWidth={2} fill="url(#gT)" name="Done" />
                    <Area type="monotone" dataKey="total" stroke={C.purp} strokeWidth={1.5} fill="transparent" strokeDasharray="4 4" name="Total" />
                  </AreaChart>
                </ResponsiveContainer>
              </div>
              <div style={{ background: C.card, borderRadius: 18, padding: "22px 18px" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#fff", marginBottom: 2 }}>Topics</div>
                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", marginBottom: 10 }}>By knowledge area</div>
                <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                  <ResponsiveContainer width={120} height={120}>
                    <PieChart><Pie data={topicD} dataKey="count" cx="50%" cy="50%" innerRadius={32} outerRadius={54} paddingAngle={3} strokeWidth={0}>
                      {topicD.map((d, i) => <Cell key={i} fill={d.color} />)}
                    </Pie></PieChart>
                  </ResponsiveContainer>
                  <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                    {topicD.map(d => (
                      <div key={d.name} style={{ display: "flex", alignItems: "center", gap: 7, fontSize: 11, color: "rgba(255,255,255,0.65)" }}>
                        <div style={{ width: 7, height: 7, borderRadius: 2, background: d.color, flexShrink: 0 }} />{d.name}
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>

            <div style={{ background: C.card, borderRadius: 18, padding: "22px 18px", marginBottom: 24 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#fff", marginBottom: 2 }}>Knowledge radar</div>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", marginBottom: 6 }}>Confidence vs volume</div>
              <ResponsiveContainer width="100%" height={220}>
                <RadarChart data={radarD}>
                  <PolarGrid stroke="rgba(255,255,255,0.08)" /><PolarAngleAxis dataKey="subject" tick={{ fill: "rgba(255,255,255,0.45)", fontSize: 11 }} /><PolarRadiusAxis tick={false} axisLine={false} />
                  <Radar name="Volume" dataKey="volume" stroke={C.purp} fill={C.purp} fillOpacity={0.18} strokeWidth={1.5} />
                  <Radar name="Confidence" dataKey="confidence" stroke={C.teal} fill={C.teal} fillOpacity={0.12} strokeWidth={1.5} />
                  <Tooltip cursor={false} content={<CustomTip color={C.purp} />} />
                </RadarChart>
              </ResponsiveContainer>
            </div>

            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 10 }}>Recent</div>
            <div style={{ display: "grid", gap: 6 }}>{tasks.slice(-4).reverse().map(t => <TaskCard key={t.id} t={t} />)}</div>
          </>}

          {view === "tasks" && <>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 10 }}>
              <div>
                <h1 style={{ fontSize: 24, fontWeight: 800, marginBottom: 2, letterSpacing: -0.5 }}>Tasks</h1>
                <p style={{ color: C.txM, fontSize: 14, margin: 0 }}>{tasks.length} tasks, {topics.length} topics</p>
              </div>
              <button onClick={() => setModal("new")} style={{ padding: "9px 18px", borderRadius: 10, border: "none", background: C.card, color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 6 }}>
                <i className="ti ti-plus" style={{ fontSize: 14 }} aria-hidden="true" /> Add task
              </button>
            </div>
            <div style={{ display: "flex", gap: 5, marginBottom: 16, flexWrap: "wrap" }}>
              {["all", ...topics].map(tp => {
                const sel = filter === tp; const cl = tp === "all" ? C.card : tc(tp, topics);
                return <button key={tp} onClick={() => setFilter(tp)} style={{ padding: "5px 14px", borderRadius: 100, border: `1px solid ${sel ? cl : C.brd}`, background: sel ? cl : "transparent", color: sel ? "#fff" : C.txM, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>{tp === "all" ? "All" : tp}</button>;
              })}
            </div>
            <div style={{ display: "grid", gap: 6 }}>{filtered.map(t => <TaskCard key={t.id} t={t} />)}</div>
            {!filtered.length && <div style={{ textAlign: "center", padding: 40, color: C.txL, fontSize: 14 }}>No tasks yet</div>}
          </>}

          {view === "collections" && <>
            <h1 style={{ fontSize: 24, fontWeight: 800, marginBottom: 2, letterSpacing: -0.5 }}>Collections</h1>
            <p style={{ color: C.txM, fontSize: 14, marginBottom: 24 }}>Learning organized by topic</p>
            <div style={{ display: "grid", gap: 16 }}>
              {topicD.map(td => {
                const tt = tasks.filter(t => t.topic === td.name);
                const dn = tt.filter(t => t.status === "done");
                const pct = Math.round(dn.length / Math.max(1, tt.length) * 100);
                const fz = tt.filter(t => t.fuzzy).map(t => t.fuzzy);
                return (
                  <div key={td.name} style={{ background: C.srf, border: `1px solid ${C.brd}`, borderRadius: 16, overflow: "hidden" }}>
                    <div style={{ padding: "16px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: `1px solid ${C.brd}`, flexWrap: "wrap", gap: 10 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        <div style={{ width: 36, height: 36, borderRadius: 10, background: td.color, display: "flex", alignItems: "center", justifyContent: "center" }}>
                          <i className="ti ti-folder" style={{ color: "#fff", fontSize: 18 }} aria-hidden="true" />
                        </div>
                        <div>
                          <div style={{ fontWeight: 700, fontSize: 15 }}>{td.name}</div>
                          <div style={{ fontSize: 12, color: C.txM }}>{tt.length} tasks, {dn.length} done</div>
                        </div>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <div style={{ width: 80, height: 5, borderRadius: 3, background: C.brd, overflow: "hidden" }}>
                          <div style={{ width: `${pct}%`, height: "100%", borderRadius: 3, background: td.color, transition: "width .3s" }} />
                        </div>
                        <span style={{ fontSize: 12, fontWeight: 700, color: td.color }}>{pct}%</span>
                      </div>
                    </div>
                    <div style={{ padding: "14px 20px" }}>
                      <div className="coll-inner" style={{ display: "grid", gap: 14 }}>
                        <div>
                          <div style={{ fontSize: 11, fontWeight: 600, color: C.txM, marginBottom: 6 }}>Confidence by task</div>
                          <ResponsiveContainer width="100%" height={70}>
                            <BarChart data={tt.map(t => ({ name: t.title.length > 12 ? t.title.slice(0, 11) + ".." : t.title, confidence: t.conf }))} barCategoryGap="25%">
                              <YAxis hide domain={[0, 7]} />
                              <Bar dataKey="confidence" radius={[4, 4, 0, 0]} cursor="pointer">
                                {tt.map((_, i) => <Cell key={i} fill={td.color} opacity={0.3 + (tt[i]?.conf || 1) * 0.1} />)}
                              </Bar>
                              <Tooltip cursor={false} content={({ active, payload }) => {
                                if (!active || !payload?.length) return null;
                                const d = payload[0].payload;
                                return <div style={{ background: C.srf, border: `1px solid ${C.brd}`, borderRadius: 8, padding: "7px 11px", boxShadow: "0 4px 12px rgba(0,0,0,0.08)", fontSize: 12 }}>
                                  <div style={{ fontWeight: 600, marginBottom: 1 }}>{d.name}</div>
                                  <div style={{ color: td.color, fontWeight: 600 }}>{d.confidence} / 7</div>
                                </div>;
                              }} />
                            </BarChart>
                          </ResponsiveContainer>
                        </div>
                        <div>
                          <div style={{ fontSize: 11, fontWeight: 600, color: C.txM, marginBottom: 6 }}>Still fuzzy</div>
                          {fz.length ? fz.map((f, i) => (
                            <div key={i} style={{ fontSize: 12, color: C.txM, padding: "3px 0", display: "flex", alignItems: "center", gap: 7 }}>
                              <div style={{ width: 5, height: 5, borderRadius: "50%", background: C.amber, flexShrink: 0 }} />{f}
                            </div>
                          )) : <div style={{ fontSize: 12, color: C.txL }}>No open gaps</div>}
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </>}

          {view === "handbook" && <>
            <h1 style={{ fontSize: 24, fontWeight: 800, marginBottom: 2, letterSpacing: -0.5 }}>Handbook</h1>
            <p style={{ color: C.txM, fontSize: 14, marginBottom: 24 }}>The frameworks behind your second brain</p>

            <div className="code-grid" style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", borderRadius: 16, overflow: "hidden", marginBottom: 28 }}>
              {[{ l:"C",w:"Capture",d:"Keep what resonates",bg:C.coral },{ l:"O",w:"Organize",d:"Save for action",bg:C.teal },{ l:"D",w:"Distill",d:"Find the essence",bg:C.blue },{ l:"E",w:"Express",d:"Show your work",bg:C.purp }].map(s => (
                <div key={s.l} style={{ background: s.bg, color: "#fff", padding: "28px 14px", textAlign: "center" }}>
                  <div style={{ fontSize: 36, fontWeight: 800, lineHeight: 1 }}>{s.l}</div>
                  <div style={{ fontWeight: 700, fontSize: 13, marginTop: 3 }}>{s.w}</div>
                  <div style={{ fontSize: 11, opacity: 0.7, marginTop: 1 }}>{s.d}</div>
                </div>
              ))}
            </div>

            <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 12 }}>7-step self-talk cycle</div>
            <div className="step-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(240px,1fr))", gap: 10, marginBottom: 28 }}>
              {[
                {n:1,t:"Set intention",d:"Define the goal before opening any tool.",c:C.blue},
                {n:2,t:"Capture inputs",d:"Gather from all sources: notes, lectures, books.",c:C.teal},
                {n:3,t:"Selection",d:"Find patterns, group for easy retrieval.",c:C.purp},
                {n:4,t:"Mental models",d:"Map conflicts and context between ideas.",c:C.amber},
                {n:5,t:"Build artifacts",d:"Recall, explain, simulate. Build knowledge gems.",c:C.coral},
                {n:6,t:"Express",d:"Ship it. Make your work useful to others.",c:C.pink},
                {n:7,t:"Reflect",d:"What worked? What is missing? Loop back.",c:C.card},
              ].map(s => (
                <div key={s.n} style={{ background: C.srf, border: `1px solid ${C.brd}`, borderRadius: 12, padding: "14px 16px", borderTop: `3px solid ${s.c}` }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                    <div style={{ width: 24, height: 24, borderRadius: "50%", background: s.c, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 12 }}>{s.n}</div>
                    <div style={{ fontWeight: 700, fontSize: 13 }}>{s.t}</div>
                  </div>
                  <div style={{ fontSize: 12, color: C.txM, lineHeight: 1.5 }}>{s.d}</div>
                </div>
              ))}
            </div>

            <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 12 }}>A.C.T.I.V.E. learning with AI</div>
            <div style={{ display: "grid", gap: 6, marginBottom: 28 }}>
              {[
                {l:"A",t:"Achieve",d:"Set goal and attempt before using AI."},
                {l:"C",t:"Choose tools",d:"Pick 1-2 tools. Define what they may and may not do."},
                {l:"T",t:"Try first",d:"Spend 5-20 min solving on your own."},
                {l:"I",t:"Interrogate",d:"Ask for hints, not answers. Ask why, not what."},
                {l:"V",t:"Verify",d:"Cross-check. Separate generator from verifier."},
                {l:"E",t:"Express",d:"Put it in your own words. Work must stand without AI."},
              ].map(r => (
                <div key={r.l} style={{ background: C.srf, border: `1px solid ${C.brd}`, borderRadius: 12, padding: "12px 16px", display: "flex", alignItems: "center", gap: 14 }}>
                  <div style={{ width: 32, height: 32, borderRadius: 8, background: C.coral, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 16, flexShrink: 0 }}>{r.l}</div>
                  <div><div style={{ fontWeight: 700, fontSize: 13 }}>{r.t}</div><div style={{ fontSize: 12, color: C.txM }}>{r.d}</div></div>
                </div>
              ))}
            </div>

            <div style={{ background: C.card, borderRadius: 16, padding: 24, color: "#fff" }}>
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 14 }}>Self-talk before every task</div>
              {["What is my goal of building this?","Why is building this component important to me?","How to build this? What tools can help?"].map((q,i) => (
                <div key={i} style={{ fontSize: 14, fontStyle: "italic", opacity: 0.6, paddingLeft: 14, borderLeft: `2px solid ${C.amber}`, marginBottom: 10, lineHeight: 1.5 }}>{q}</div>
              ))}
            </div>
          </>}
        </main>
      </div>

      {/* BOTTOM NAV (MOBILE) */}
      <nav className="bottombar" style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "rgba(255,253,249,0.92)", backdropFilter: "blur(16px)", borderTop: `1px solid ${C.brd}`, display: "none", justifyContent: "space-around", padding: "6px 0 env(safe-area-inset-bottom, 8px)", zIndex: 90 }}>
        {NAV.map(n => (
          <button key={n.id} onClick={() => setView(n.id)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2, background: "none", border: "none", cursor: "pointer", padding: "6px 10px", color: view === n.id ? C.coral : C.txL, fontFamily: "inherit" }}>
            <i className={`ti ti-${n.icon}`} style={{ fontSize: 20 }} aria-hidden="true" />
            <span style={{ fontSize: 10, fontWeight: 600 }}>{n.label}</span>
          </button>
        ))}
        <button onClick={() => setModal("new")} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2, background: "none", border: "none", cursor: "pointer", padding: "6px 10px", fontFamily: "inherit" }}>
          <div style={{ width: 28, height: 28, borderRadius: 8, background: C.coral, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <i className="ti ti-plus" style={{ fontSize: 16, color: "#fff" }} aria-hidden="true" />
          </div>
          <span style={{ fontSize: 10, fontWeight: 600, color: C.coral }}>New</span>
        </button>
      </nav>

      {modal && <Modal onClose={() => setModal(null)}>
        <TaskForm task={modal === "new" ? null : modal} topics={topics} onSave={save} onClose={() => setModal(null)} onDelete={del} />
      </Modal>}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
